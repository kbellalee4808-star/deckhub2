:root{--navy:#1B3A5C;--navy2:#13283f;--gold:#D4A94A;--ivory:#FAF7F2;--ink:#22303f;--muted:#6f7d8a;--line:#e7e0d3;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--ivory);color:var(--ink);font-family:'Noto Sans KR',sans-serif;word-break:keep-all;}
body{min-height:100dvh;}
.disp{font-family:'Gmarket Sans','Noto Sans KR',sans-serif;}
header{position:sticky;top:0;z-index:50;background:linear-gradient(150deg,#22507c,var(--navy) 60%,var(--navy2));color:#fff;padding:18px 18px 16px;padding-top:max(18px,env(safe-area-inset-top));box-shadow:0 6px 22px rgba(19,40,63,.22);}
.hwrap{max-width:720px;margin:0 auto;}
.over{font-family:'Gmarket Sans';font-weight:700;letter-spacing:.30em;color:var(--gold);font-size:11px;}
.htitle{font-family:'Gmarket Sans';font-weight:700;font-size:22px;margin-top:7px;letter-spacing:-.2px;}
.htitle small{font-weight:300;color:#cfe0ef;font-size:14px;margin-left:6px;}
.back{display:none;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#eaf1f8;font-family:'Noto Sans KR';font-size:13px;font-weight:500;border-radius:30px;height:38px;padding:0 16px;cursor:pointer;margin-bottom:12px;}
.searchbox{margin-top:14px;position:relative;display:none;align-items:center;}
.searchbox svg{position:absolute;left:16px;width:20px;height:20px;stroke:#9fb2c4;pointer-events:none;}
#q{width:100%;height:54px;border:none;border-radius:14px;padding:0 46px;font-size:16px;font-family:'Noto Sans KR';background:#fff;color:var(--ink);box-shadow:0 4px 14px rgba(0,0,0,.12);outline:none;}
#q::placeholder{color:#aeb8c2;}
#clear{position:absolute;right:9px;width:40px;height:40px;border:none;background:#eef1f4;border-radius:50%;color:#7b8a99;font-size:18px;display:none;align-items:center;justify-content:center;cursor:pointer;}
.chips{display:none;gap:8px;overflow-x:auto;margin-top:12px;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;min-height:46px;padding:0 16px;display:flex;align-items:center;border-radius:30px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.08);color:#e7eef5;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}
.chip.on{background:var(--gold);border-color:var(--gold);color:#1b2f45;font-weight:700;}
main{max-width:720px;margin:0 auto;padding:18px 16px calc(40px + env(safe-area-inset-bottom));}
/* HUB */
.intro{font-size:14px;color:var(--muted);margin:2px 2px 18px;line-height:1.6;}
.linehd{font-family:'Gmarket Sans';font-weight:700;font-size:12px;letter-spacing:.06em;color:var(--gold);margin:18px 4px 10px;display:flex;align-items:center;gap:8px;}
.linehd::after{content:"";flex:1;height:1px;background:var(--line);}
.shipcard{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:0;margin-bottom:11px;box-shadow:0 3px 12px rgba(27,58,92,.06);overflow:hidden;cursor:pointer;}
.shipcard .bar{flex:0 0 6px;align-self:stretch;}
.shipcard .sc{flex:1;padding:16px 4px 16px 12px;min-width:0;}
.shipcard .skr{font-family:'Gmarket Sans';font-weight:700;font-size:18px;color:var(--navy);}
.shipcard .sen{font-size:11px;letter-spacing:.12em;color:#aeb6bf;margin-top:3px;font-weight:500;}
